version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: gymflow-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: gymflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academia -d academia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: